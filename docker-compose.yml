version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./oraclevision.db
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4-turbo-preview}
      - DEBUG=false
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    networks:
      - oraclevision

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - oraclevision

networks:
  oraclevision:
    driver: bridge
